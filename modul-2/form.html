<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <h1>Form Pendaftaran Workshop</h1>

    <form action="#" method="=POST">

        <!--DESTYANA SILVIRA KURNIA-->
        <div>
            <label for="nama">Nama Lengkap *</label><br>
            <input
                type="text"
                id="nama"
                name="nama"
                placeholder="Masukkan nama lengkap"
                minlength="3"
                maxlength="100"
                    required>
        </div>

        <div>
            <label for="email">Email *</label><br>
            <input
                type="email"
                id="email"
                name="email"
                placeholder="contoh@email.com"
                required>
        </div>

        <div>
            <label for="password">password *</label><br>
            <input
                type="password"
                id="password"
                name="password"
                minlength="8"
                placeholder="Minimal 8 karakter"
                required>
        </div>

        <div>
            <label for="tanggal_lahir">Tanggal Lahir</label><br>
            <input type="date" id="tanggal_lahir">
        </div>

        <div>
            <p>Jenis Kelamin *</p>
            <input type="radio" id="laki" name="jenis_kelamin" value="L" required>
            <label for="laki">Laki-Laki</label>
            <br>
            <input type="radio" id="perempuan" name="jenis_kelamin" value="p">
            <label for="perempuan">Perempuan</label>
        </div>

        <div>
            <label for="kelas">Pilih kelas *</label><br>
            <select id="kelas" name="kelas" required>
                <option value="">--Pilih Kelas --</option>
                <option value="A">Kelas A (Senin-Rabu)</option>
                <option value="=B">Kelas B (Selasa-Kamis)</option>
                <option value="C">Kelas C (Jumat-Sabtu)</option>
            </select>
        </div>

        <div>
            <p>Topik yang diminati :</p>
            <input type="checkbox" id="html" name="minat" value="html">
            <label for="html">HTML & CSS</label><br>
            <input type="checkbox" id="js" name="minat" value="js">
            <label for="js">JavaScript</label><br>
            <input type="checkbox" id="react" name="minat" value="react">
            <label for="react">React</label><br>
        </div>
        <div>
            <label for="pesan">Pertanyaan atau pesan</label><br>
            <textarea
                id="pesan"
                name="pesan"
                rows="4"
                cols="40"
                placeholder="Tulis pertanyaanmu disini..."></textarea>
        </div>

        <div>
            <button type="submit">Daftar sekarang</button>
            <button type="reset">Reset Form</button>
        </div>
    </form>
    
</body>
</html>
