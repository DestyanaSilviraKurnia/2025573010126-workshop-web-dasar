<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Latihan 1 - Styling Komponen UI</title>
    <link rel="stylesheet" href="latihan-1.css">
</head>
<body>

    <h2>1. Komponen Tombol (Button)</h2>
    <button class="btn btn-primary">Primary</button>
    <button class="btn btn-secondary">Secondary</button>
    <button class="btn btn-danger">Danger</button>
    <button class="btn btn-outline">Outline</button>

    <hr>

    <h2>2. Komponen Badge / Tag</h2>
    <span class="badge badge-new">Baru</span>
    <span class="badge badge-hot">Populer</span>
    <span class="badge badge-sale">Diskon</span>

    <hr>

    <h2>3. Komponen Alert Box</h2>
    <div class="alert alert-success"> Berhasil: Data telah disimpan!</div>
    <div class="alert alert-warning"> Peringatan: Periksa kembali form anda.</div>
    <div class="alert alert-error"> Error: Koneksi terputus.</div>

</body>
</html>
